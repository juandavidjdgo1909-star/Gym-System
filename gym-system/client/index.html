<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Gym System Login</title>
    <link href="./css/output.css" rel="stylesheet" />
  </head>

  <body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-96">
      <h2 class="text-3xl font-bold text-white text-center mb-6">
        💪 Gym System
      </h2>
      <form class="space-y-4">
        <div>
          <label class="text-gray-300">Correo</label>
          <input
            type="email"
            placeholder="ejemplo@gmail.com"
            class="w-full mt-1 p-2 rounded-lg bg-gray-700 text-white outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="text-gray-300">Contraseña</label>
          <input
            type="password"
            placeholder="********"
            class="w-full mt-1 p-2 rounded-lg bg-gray-700 text-white outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold transition"
        >
          Iniciar Sesión
        </button>
      </form>

      <p class="text-gray-400 text-sm text-center mt-4">
        ¿No tienes cuenta?
        <a href="#" class="text-blue-400 hover:underline">Regístrate</a>
      </p>
    </div>
  </body>
</html>
